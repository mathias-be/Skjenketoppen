        body {

            color: var(--text-dark);
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Navigation */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 110px;
            background: rgba(255,255,255,0.8);
            border: 2px solid transparent;
            padding: 14px;
            border-radius: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .tab-btn.active {
            background: var(--white);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(190, 0, 100, 0.2);
        }

        /* Podium / Pall */
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            min-height: 520px;
            margin-bottom: 10px;
        }

        .podium-spot {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .rank-1 { order: 2; z-index: 5; }
        .rank-2 { order: 1; }
        .rank-3 { order: 3; }

        .visual-area {
            height: 250px;
            width: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 0;
        }

        .emoji-scaler {
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: bottom center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .floating-emoji {
            font-size: 5rem;
            margin-bottom: -10px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .glass-body {
            width: 70px;
            height: 120px;
            border: 4px solid #1a1a1a;
            border-top: none;
            border-radius: 0 0 18px 18px;
            background: rgba(255,255,255,0.6);
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .liquid { width: 100%; height: 92%; transition: background 0.5s; }
        .cat-g1 .liquid { background: var(--beer-color); }
        .cat-g2 .liquid { background: var(--wine-color); }
        .cat-g3 .liquid { background: var(--spirit-color); }

        .podium-step {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 8px 30px;
            border-radius: 16px 16px 0 0;
            box-shadow: inset 0 2px 20px rgba(255,255,255,0.1);
            transition: min-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rank-1 .podium-step { 
            min-height: 260px; 
            background: #000; 
            border-top: 8px solid var(--primary); 
            box-shadow: 0 -10px 40px rgba(190, 0, 100, 0.4);
        }
        .rank-2 .podium-step { 
            min-height: 180px; 
            background: #1a1a1a; 
            border-top: 6px solid var(--accent); 
        }
        .rank-3 .podium-step { 
            min-height: 130px; 
            background: #2a2a2a; 
            border-top: 6px solid #555; 
        }

        /* Placement Numbers on Podium */
        .step-number {
            font-size: 3rem;
            font-weight: 1000;
            line-height: 1;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .rank-1 .step-number { color: #ffeb3b; opacity: 1; }
        .rank-2 .step-number { color: #ffffff; opacity: 1; }
        .rank-3 .step-number { color: #bbbbbb; opacity: 1; }

        .venue-name {
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 8px;
            text-align: center;
            color: #fff;
            width: 100%;
        }

        .rank-1 .venue-name { font-size: 1.6rem; }
        .rank-2 .venue-name { font-size: 1.2rem; }
        .rank-3 .venue-name { font-size: 1.1rem; }

        .venue-liters {
            font-weight: 1000;
            line-height: 1;
            color: #fff;
        }

        .rank-1 .venue-liters { font-size: 1.7rem; color: #ffeb3b; }
        .rank-2 .venue-liters { font-size: 1.4rem; color: #fff; }
        .rank-3 .venue-liters { font-size: 1.3rem; color: #eee; }

        .liter-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 4px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
        }

        /* Search and Results */
        input[type="text"] {
            width: 100%;
            padding: 20px 25px;
            border: 3px solid transparent;
            border-radius: 22px;
            font-size: 1.2rem;
            background: #fff;
            outline: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        .result-row {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 6px solid var(--primary);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .res-title { font-weight: 950; font-size: 1.2rem; color: var(--text-dark); }
        .res-addr { font-size: 0.8rem; opacity: 0.7; font-weight: 700; margin-top: 2px; }

        .res-all-data {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }

        .res-data-item {
            text-align: center;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .res-icon { font-size: 1.2rem; margin-bottom: 2px; }
        .res-val { font-weight: 1000; font-size: 1rem; color: var(--primary); }
        .res-lbl { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; opacity: 0.6; }

        /* Footer and source */
        .footer-card {
            background: rgba(0, 0, 0, 0.92);
            color: #fff;
            padding: 20px 30px;
            border-radius: 24px;
            text-align: center;
            margin-top: 20px;

            border: 1px solid rgba(255,255,255,0.1);

            .podium-container { flex-direction: column; align-items: center; gap: 35px; min-height: auto; padding-top: 40px; }
            .podium-spot { width: 100%; order: unset !important; }

            .rank-1 .venue-name { font-size: 1.5rem; }
            h1 { font-size: 1.8rem; }
            .visual-area { height: 180px; }
            .res-all-data { grid-template-columns: 1fr; }
        }
    </style>
</head>

        {navn: "Choco Loco", g1: 60, g2: 200, g3: 0, adresse: "Nygaardsgata 45"},
        {navn: "Su Sushi Bar", g1: 60, g2: 15, g3: 7, adresse: "Nygaardsgata 35"},
        {navn: "M/S Hvaler", g1: 60, g2: 9, g3: 0, adresse: "Mindre-Alvs vei 3"},
        {navn: "Kjøkkentjenesten", g1: 36, g2: 37, g3: 1, adresse: "Tomteveien 49"},
        {navn: "Studentsamskipnaden", g1: 31, g2: 0, g3: 0, adresse: "Kobberslagerstredet 5"},
        {navn: "Vik Selskapslokaler", g1: 24, g2: 35, g3: 1, adresse: "Haldenveien 174"},
        {navn: "Christensen bakeri", g1: 23, g2: 38, g3: 0, adresse: "Storveien 81A"},
        {navn: "City Burger", g1: 6, g2: 2, g3: 0, adresse: "Stortorvet 9"}
    ];

    let current = 'g1';
    const emojis = { g1: '🍺', g2: '🍷', g3: '🥃' };
    const fmt = n => n.toLocaleString('no-NO');

    function updateView(cat, btn) {
        current = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
        search();
    }

    function render() {
        const area = document.getElementById('podium');
        const sorted = [...venues].sort((a,b) => b[current] - a[current]).slice(0,3);
        const max = sorted[0][current];

        area.innerHTML = '';
        sorted.forEach((item, i) => {
            const scale = item[current] / max;
            const rank = i + 1;
            
            const div = document.createElement('div');
            div.className = `podium-spot rank-${rank} cat-${current}`;
            div.innerHTML = `
                <div class="visual-area">
                    <div class="emoji-scaler" style="transform: scale(${scale});">
                        <span class="floating-emoji">${emojis[current]}</span>
                        <div class="glass-body">
                            <div class="liquid"></div>
                        </div>
                    </div>
                </div>
                <div class="podium-step">
                    <span class="step-number">${rank}</span>
                    <div class="venue-name">${item.navn}</div>
                    <div class="venue-liters">${fmt(item[current])}</div>
                    <span class="liter-label">liter solgt</span>
                </div>
            `;
            area.appendChild(div);
        });
    }

    function search() {
        const term = document.getElementById('search').value.toLowerCase();
        const area = document.getElementById('results');
        area.innerHTML = '';
        if (term.length < 2) return;

        const res = venues.filter(v => v.navn.toLowerCase().includes(term));
        if (!res.length) {
            area.innerHTML = '<div class="result-row" style="justify-content:center; font-weight:900;">INGEN TREFF I REGISTERET</div>';
            return;
        }

        res.forEach(v => {
            const div = document.createElement('div');
            div.className = 'result-row';
            div.innerHTML = `
                <div class="res-header">
                    <div>
                        <div class="res-title">${v.navn}</div>
                        <div class="res-addr">${v.adresse}</div>
                    </div>
                </div>
                <div class="res-all-data">
                    <div class="res-data-item">
                        <span class="res-icon">🍺</span>
                        <span class="res-val">${fmt(v.g1)}</span>
                        <span class="res-lbl">Øl/Sider</span>
                    </div>
                    <div class="res-data-item">
                        <span class="res-icon">🍷</span>
                        <span class="res-val">${fmt(v.g2)}</span>
                        <span class="res-lbl">Vin</span>
                    </div>
                    <div class="res-data-item">
                        <span class="res-icon">🥃</span>
                        <span class="res-val">${fmt(v.g3)}</span>
                        <span class="res-lbl">Brennevin</span>
                    </div>
                </div>
            `;
            area.appendChild(div);
        });
    }

    window.onload = render;

    // Auto-resize for smartembed
    (function () {
        if (window.self === window.top) return;
        const sendH = () => {
            const height = Math.ceil(document.documentElement.scrollHeight);
            window.parent.postMessage({ type: "resize", height: height }, "*");
        };
        window.addEventListener("load", sendH);
        window.addEventListener("resize", sendH);
        if ("ResizeObserver" in window) new ResizeObserver(sendH).observe(document.body);
    })();
</script>
</body>
</html>
